services:
  postgres:
    image: postgres:18-alpine
    container_name: installment-reminder-postgres
    environment:
      POSTGRES_DB: installment_reminder_db
      POSTGRES_USER: installment_user
      POSTGRES_PASSWORD: installment_password
    ports:
      - "5432:5432"
    volumes:
      - installment-reminder-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U installment_user -d installment_reminder_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    container_name: installment-reminder-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@installmentreminder.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  installment-reminder-pgdata: